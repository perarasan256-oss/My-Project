<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Smart Exam Seat Allocation - Login</title>
    <!-- Link to our shared CSS -->
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <!-- Login Container -->
    <div class="login-container">
        <div class="login-box">
            <!-- Title -->
            <h2>SMART EXAM SEAT ALLOCATION</h2>
            <p class="subtitle">Login to your account</p>

            <!-- Error message area (shown by PHP) -->
            <div id="error-msg" style="display:none;" class="alert alert-error"></div>

            <!-- Login Form -->
            <!-- Form submits to login.php which handles authentication -->
            <form action="login.php" method="POST" onsubmit="return validateLoginForm()">
                
                <!-- Note: role will be auto-detected by username/password -->

                <!-- Username / Register Number -->
                <div class="form-group">
                    <label for="username">Username / Register Number</label>
                    <input type="text" id="username" name="username" placeholder="Enter your username" required>
                </div>

                <!-- Password -->
                <div class="form-group">
                    <label for="password">Password</label>
                    <input type="password" id="password" name="password" placeholder="Enter your password" required>
                </div>

                <!-- Submit Button -->
                <button type="submit" class="btn btn-primary">Login</button>
            </form>
        </div>
    </div>

    <!-- Link to our shared JavaScript -->
    <script src="js/validation.js"></script>
    <!-- Fallback: remove role selector if still present (handles cached pages) -->
    <script>
        document.addEventListener('DOMContentLoaded', function() {
            var params = new URLSearchParams(window.location.search);
            var error = params.get('error');
            var errorBox = document.getElementById('error-msg');
            if (error && errorBox) {
                errorBox.textContent = error;
                errorBox.style.display = 'block';
            }

            var roleEl = document.getElementById('role');
            if (roleEl) {
                // remove the whole form-group wrapper if present
                var wrapper = roleEl.closest('.form-group') || roleEl.parentNode;
                wrapper.parentNode.removeChild(wrapper);
            }
        });
    </script>
</body>
</html>
